<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1F3D2B"/>
      <stop offset="100%" style="stop-color:#2D5A3D"/>
    </linearGradient>
    <linearGradient id="flagGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B5432D"/>
      <stop offset="100%" style="stop-color:#8B2E1F"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="192" height="192" fill="url(#bgGradient)" rx="45"/>

  <!-- Sky gradient -->
  <rect width="192" height="110" fill="#87CEEB" opacity="0.2" rx="45"/>

  <!-- Mountains/hills background -->
  <path d="M 0 100 Q 48 50 96 70 Q 144 50 192 100 L 192 192 Q 96 180 0 192 Z" fill="#3A6B4A" opacity="0.3"/>

  <!-- Fairway grass -->
  <ellipse cx="96" cy="135" rx="70" ry="35" fill="#4A8A5E" opacity="0.5"/>

  <!-- Flag pole -->
  <rect x="88" y="60" width="6" height="65" fill="#8B6F47" rx="3"/>

  <!-- Flag waving -->
  <path d="M 94 60 Q 115 58 125 68 Q 115 75 94 73 Z" fill="url(#flagGrad)" rx="2"/>

  <!-- Flag details -->
  <circle cx="105" cy="65" r="3" fill="#F2E3BC" opacity="0.7"/>

  <!-- Golf ball on fairway -->
  <circle cx="96" cy="125" r="16" fill="#FFFFFF"/>

  <!-- Golf ball dimples -->
  <g fill="#1F3D2B" opacity="0.4">
    <circle cx="85" cy="115" r="2.5"/>
    <circle cx="96" cy="112" r="2.5"/>
    <circle cx="107" cy="115" r="2.5"/>
    <circle cx="82" cy="125" r="2.5"/>
    <circle cx="110" cy="125" r="2.5"/>
    <circle cx="85" cy="135" r="2.5"/>
    <circle cx="96" cy="138" r="2.5"/>
    <circle cx="107" cy="135" r="2.5"/>
  </g>

  <!-- Ball shine/highlight -->
  <circle cx="90" cy="118" r="5" fill="#FFFFFF" opacity="0.6"/>

  <!-- Decorative elements: small flag in distance -->
  <g opacity="0.3">
    <rect x="150" y="95" width="3" height="20" fill="#C7972F"/>
    <rect x="153" y="95" width="15" height="8" fill="#B5432D"/>
  </g>
</svg>